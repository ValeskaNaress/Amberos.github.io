<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Pokemon</title>
    <link rel="stylesheet" href="../style/pokemon_amberos.css">
</head>

<body>
    <div id='carte_type' class='Electrik carte_column zone'>

        <div id='carte_entete' class='zone carte_left carte_row carte_justify_space'>
            <h2>Luxray (Amberos)</h2>
            <div class='carte_row carte_justify_right'>
                <img class='img_20' src='../images/icons/types/Glace.png'>
                <img class='img_20 marg_left' src='../images/icons/types/Electrik.png'>
            </div>
        </div>

        <div id='carte_img' class='zone Blanc self_center'>
            <img class='img_50' src='../images/pokemons/Luxray_Amberos.png'>
        </div>

        <div id='carte_dresseur' class='zone Blanc carte_row carte_left'>
            <p><b>Dresseur(s) : </b>Alsine</p>
        </div>
        
        <div id='carte_infos' class='zone Blanc carte_column carte_left'>

            <div id='carte_talents' class='carte_column space'>
                <p class='bold'>Talent(s) :&nbsp</p>
                <ul>
                    <li>Rivalité</li>
                    <li>Intimidation</li>
                    <li>Cran (Talent caché)</li>
                </ul>
            </div>

            <div id='carte_dangerosite' class='carte_row space'>
                <p><b>Dangerosité : </b>Elevée</p>
            </div>

            <div id='carte_table_des_types' class='carte_column space'>
                <p class='bold'>Faiblesses :&nbsp</p>
                <div id='carte_faiblesses' class='carte_row space'>
                    <img class='img_8' src='../images/icons/types/Combat.png'>
                    <img class='img_8 marg_left' src='../images/icons/types/Sol.png'>
                    <img class='img_8 marg_left' src='../images/icons/types/Roche.png'>
                    <img class='img_8 marg_left' src='../images/icons/types/Feu.png'>
                    
                </div>

                <p class='bold'>Résistances :&nbsp</p>
                <div id='carte_resistances' class='carte_row space'>
                    <img class='img_8' src='../images/icons/types/Glace.png'>
                    <img class='img_8 marg_left' src='../images/icons/types/Vol.png'>
                    <img class='img_8 marg_left' src='../images/icons/types/Electrik.png'>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
