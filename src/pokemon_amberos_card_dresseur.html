<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Pokemon</title>
    <link rel="stylesheet" href="../style/pokemon_amberos.css">
</head>

<body>
    <div id='carte_blanc' class='Blanc zone'>
        <div id='carte_type' class='Dresseur carte_grid zone'>

            <div id="dresseur_img" class='zone Blanc carte_center self_center'>
                <img src='../images/dresseurs/Dianthéa.png'>
            </div>

            <div id="dresseur_entete" class='zone carte_left'>
                <h1>Alsine</h1>
            </div>
            
            <div id="dresseur_description" class='zone Blanc carte_column carte_left'>
                <div class='carte_row margin'>
                    <p><b>Rôle(s) : </b>Dirigeante du groupe Z</p>
                </div>
                <div class='carte_row margin'>
                    <p><b>Grade :</b> Noble</p>
                </div>
                <div class='carte_row margin'>
                    <p><b>Pokemon(s) : </b>Luxray, Gardevoir</p>
                </div>
                <div class='margin'>
                    <p class='bold'>Caractère :&nbsp</p>
                    <ul>
                        <li>Aime :&nbsp</li>
                        <li>N'aime pas :&nbsp</li>
                    </ul>
                </div>
                <div class='carte_row margin'>
                    <p><b>Goûts :&nbsp</b></p>
                </div>
                <div class='carte_row margin'>
                    <p><b>Relations :&nbsp</b></p>
                </div>
                <div class='carte_row margin'>
                    <p><b>Epithètes :&nbsp</b></p>
                </div>
                <div class='carte_row margin'>
                    <p><b>Descendant(e) : </b>Dianthéa</p>
                </div>
                <div class='carte_row margin'>
                    <p><b>Région et époque : </b>Amberos (-2700)</p>
                </div>
            </div>

            <div id="dresseur_bonus" class='zone Blanc carte_column carte_left'>
                <h3>Informations supplémentaires :&nbsp</h3>
            </div>
        </div>
    </div>

</body>

</html>
